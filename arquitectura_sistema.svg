<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitectura del sistema: del formulario a la estimación</title>
<desc>Diagrama de cuatro capas: frontend en Streamlit, backend en app.py, el modelo de red neuronal en PyTorch, y la capa de salida que genera la estimación final y la persiste.</desc>
<style>
  .layer-label { font: 700 13px Calibri, sans-serif; fill: #028090; letter-spacing: 1px; }
  .box-title { font: 700 15.5px Georgia, serif; fill: #17313E; }
  .box-title-light { font: 700 15.5px Georgia, serif; fill: #FFFFFF; }
  .box-sub { font: 400 11.5px Calibri, sans-serif; fill: #5C6B70; }
  .box-sub-light { font: 400 11.5px Calibri, sans-serif; fill: #CADCE0; }
  .flow-label { font: italic 12px Calibri, sans-serif; fill: #5C6B70; }
  .title-main { font: 700 22px Georgia, serif; fill: #17313E; }
  .title-sub { font: 400 13px Calibri, sans-serif; fill: #5C6B70; }
  .artifact { font: 400 11.5px Calibri, sans-serif; fill: #5C6B70; }
  .artifact-b { font: 700 11.5px Calibri, sans-serif; fill: #028090; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#028090"/>
  </marker>
  <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5C6B70"/>
  </marker>
</defs>

<rect x="0" y="0" width="1000" height="700" fill="#FFFFFF"/>

<text x="470" y="30" text-anchor="middle" class="title-main">Del formulario a la estimación: cómo funciona el sistema</text>
<text x="470" y="50" text-anchor="middle" class="title-sub">Frontend (Streamlit) → Backend (app.py) → Modelo (PyTorch) → Salida</text>

<!-- LAYER 1: FRONTEND -->
<text x="40" y="80" class="layer-label">FRONTEND · STREAMLIT — interfaz de usuario</text>
<g>
  <rect x="40" y="88" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="166.5" y="118" text-anchor="middle" class="box-title">Formulario de captura</text>
  <text x="166.5" y="140" text-anchor="middle" class="box-sub">Tipo, grupo, prioridad,</text>
  <text x="166.5" y="154" text-anchor="middle" class="box-sub">carga, fecha…</text>

  <rect x="313" y="88" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="439.5" y="118" text-anchor="middle" class="box-title">Panel de resultados</text>
  <text x="439.5" y="140" text-anchor="middle" class="box-sub">Métricas y figuras</text>
  <text x="439.5" y="154" text-anchor="middle" class="box-sub">del entrenamiento</text>

  <rect x="586" y="88" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="712.5" y="118" text-anchor="middle" class="box-title">Historial</text>
  <text x="712.5" y="140" text-anchor="middle" class="box-sub">Lee predicciones_log.csv</text>
  <text x="712.5" y="154" text-anchor="middle" class="box-sub">y su estado de validación</text>
</g>

<line x1="470" y1="166" x2="470" y2="200" stroke="#028090" stroke-width="2" marker-end="url(#arrow)"/>
<text x="486" y="187" class="flow-label">datos capturados por el usuario</text>

<!-- LAYER 2: BACKEND -->
<text x="40" y="218" class="layer-label">BACKEND · LÓGICA DE app.py</text>
<g>
  <rect x="40" y="226" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="166.5" y="256" text-anchor="middle" class="box-title" font-size="14.5">cargar_modelo()</text>
  <text x="166.5" y="278" text-anchor="middle" class="box-sub">Carga pesos y</text>
  <text x="166.5" y="292" text-anchor="middle" class="box-sub">preprocesador (cacheado)</text>

  <rect x="313" y="226" width="253" height="78" rx="10" fill="#028090" stroke="#028090"/>
  <text x="439.5" y="256" text-anchor="middle" class="box-title-light" font-size="14">predecir_con_trazas()</text>
  <text x="439.5" y="278" text-anchor="middle" class="box-sub-light">Estandariza, mapea a</text>
  <text x="439.5" y="292" text-anchor="middle" class="box-sub-light">índices y ejecuta el modelo</text>

  <rect x="586" y="226" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="712.5" y="256" text-anchor="middle" class="box-title" font-size="14.5">registrar_prediccion()</text>
  <text x="712.5" y="278" text-anchor="middle" class="box-sub">Escribe la consulta</text>
  <text x="712.5" y="292" text-anchor="middle" class="box-sub">en predicciones_log.csv</text>
</g>
<text x="470" y="320" text-anchor="middle" class="artifact">Artefacto: preprocesador.json (mapeos categoría→índice, media/desviación)</text>

<line x1="470" y1="330" x2="470" y2="362" stroke="#028090" stroke-width="2" marker-end="url(#arrow)"/>
<text x="486" y="350" class="flow-label">vector de entrada (26 dimensiones)</text>

<!-- LAYER 3: MODELO -->
<text x="40" y="380" class="layer-label">MODELO · RED NEURONAL (PyTorch)</text>
<g>
  <rect x="150" y="388" width="330" height="86" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="315" y="422" text-anchor="middle" class="box-title">Embeddings</text>
  <text x="315" y="444" text-anchor="middle" class="box-sub">6 variables categóricas</text>
  <text x="315" y="458" text-anchor="middle" class="box-sub">(dimensión 2–4 cada una)</text>

  <rect x="510" y="388" width="330" height="86" rx="10" fill="#0B3D42" stroke="#0B3D42"/>
  <text x="675" y="422" text-anchor="middle" class="box-title-light">MLP 128 → 64 → 32 → 1</text>
  <text x="675" y="444" text-anchor="middle" class="box-sub-light">ReLU + Dropout(0.1)</text>
  <text x="675" y="458" text-anchor="middle" class="box-sub-light">pesos: modelo_turnaround_time.pt</text>
</g>

<line x1="470" y1="474" x2="470" y2="506" stroke="#028090" stroke-width="2" marker-end="url(#arrow)"/>
<text x="486" y="494" class="flow-label">salida en escala log1p(horas)</text>

<!-- LAYER 4: SALIDA -->
<text x="40" y="524" class="layer-label">SALIDA · ESTIMACIÓN FINAL</text>
<g>
  <rect x="40" y="532" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="166.5" y="562" text-anchor="middle" class="box-title">expm1() → horas</text>
  <text x="166.5" y="584" text-anchor="middle" class="box-sub">Transforma la salida</text>
  <text x="166.5" y="598" text-anchor="middle" class="box-sub">a la escala original</text>

  <rect x="313" y="532" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="439.5" y="562" text-anchor="middle" class="box-title">Rango ± MAE</text>
  <text x="439.5" y="584" text-anchor="middle" class="box-sub">Margen de error</text>
  <text x="439.5" y="598" text-anchor="middle" class="box-sub">del modelo en prueba</text>

  <rect x="586" y="532" width="253" height="78" rx="10" fill="#F4F9F9" stroke="#DCE7E7"/>
  <text x="712.5" y="562" text-anchor="middle" class="box-title">Alerta de plazo</text>
  <text x="712.5" y="584" text-anchor="middle" class="box-sub">Compara contra el</text>
  <text x="712.5" y="598" text-anchor="middle" class="box-sub">plazo comprometido</text>
</g>

<!-- Return path to UI -->
<path d="M 900 610 L 950 610 L 950 127 L 900 127" fill="none" stroke="#5C6B70" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowDash)"/>
<text x="963" y="372" class="flow-label" transform="rotate(90 963 372)" text-anchor="middle">se muestra en la interfaz</text>

<text x="470" y="640" text-anchor="middle" class="artifact">La respuesta se muestra en la UI (línea punteada) y, a la vez, queda registrada en predicciones_log.csv para el ciclo de reentrenamiento.</text>

</svg>
